<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縦書きエディタ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
/* ======================================================
   リセット・変数
   ====================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font:     "ヒラギノ明朝 ProN","Hiragino Mincho ProN","HiraMinProN-W3",
              "游明朝","Yu Mincho","YuMincho","ＭＳ 明朝",serif;
  --ui-font:  system-ui, "Helvetica Neue", sans-serif;
  --fs:       11;       /* pt (数値のみ) */
  --lh:       2.2;
  --pw:       148mm;
  --ph:       210mm;
  --mg:       10mm;
  --hdr:      7mm;      /* ヘッダー行番号エリアの高さ */
  --brand:    #1a4e8a;
  --brand-dk: #123567;
  --brand-lt: #d6e8f7;
  --ribbon:   #f3f3f3;
  --rb-line:  #d0d0d0;
  --canvas:   #8c8c8c;
  --paper:    #ffffff;
  --ink:      #0d0d0d;
  --num-c:    #999999;
  --status:   #1a4e8a;
}
html, body {
  height: 100%; overflow: hidden;
  font-family: var(--ui-font);
  background: var(--canvas);
}
body { display: flex; flex-direction: column; }

/* ======================================================
   タイトルバー
   ====================================================== */
#titlebar {
  background: var(--brand); color: #fff;
  height: 28px; display: flex; align-items: center;
  padding: 0 10px; gap: 8px; flex-shrink: 0; user-select: none;
}
#titlebar .logo {
  font-family: Georgia, serif; font-size: 14px; font-weight: bold;
  background: #fff; color: var(--brand);
  width: 20px; height: 20px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#titlebar .doc-name { font-size: 12px; opacity: .85; }
#titlebar .flex1 { flex: 1; }

/* ======================================================
   リボン（ツールバー）
   ====================================================== */
#ribbon {
  background: var(--ribbon); border-bottom: 1px solid var(--rb-line);
  display: flex; align-items: stretch; padding: 0 6px;
  flex-shrink: 0; min-height: 62px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.rgrp {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4px 10px; gap: 4px;
  border-right: 1px solid var(--rb-line); position: relative;
}
.rgrp:last-child { border-right: none; }
.rgrp-label {
  position: absolute; bottom: 4px; left: 0; right: 0;
  text-align: center; font-size: 10px; color: #999; letter-spacing: .04em;
}
.rrow { display: flex; align-items: center; gap: 5px; }
.rl   { font-size: 11px; color: #555; font-family: var(--ui-font); }
.rn {
  width: 46px; padding: 3px 4px; border: 1px solid #bbb; border-radius: 3px;
  font-size: 12px; text-align: center; background: #fff; color: #222;
  font-family: var(--ui-font);
}
.rn:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-lt); }
.rbtn {
  background: transparent; border: 1px solid transparent; border-radius: 3px;
  padding: 4px 10px; cursor: pointer; font-size: 12px;
  font-family: var(--ui-font); color: #222;
  display: flex; align-items: center; gap: 4px;
  transition: background .1s, border-color .1s; white-space: nowrap;
}
.rbtn:hover  { background: #e3e3e3; border-color: #bbb; }
.rbtn:active { background: #d3d3d3; }
.rbtn.acc {
  background: var(--brand); color: #fff;
  border-color: var(--brand-dk); font-weight: 600; padding: 5px 14px;
}
.rbtn.acc:hover  { background: var(--brand-dk); }
.rbtn.acc:active { background: #0d2749; }
.rchk {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #333; cursor: pointer; font-family: var(--ui-font);
}
.rchk input { accent-color: var(--brand); cursor: pointer; }

/* ======================================================
   スクロールキャンバス
   ====================================================== */
#canvas {
  flex: 1; overflow: auto;
  padding: 24px 0 40px;
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
}

/* ======================================================
   用紙（A5）
   ====================================================== */
.paper {
  background: var(--paper);
  width: var(--pw); height: var(--ph);
  box-shadow: 0 2px 20px rgba(0,0,0,.4), 0 0 0 1px rgba(0,0,0,.15);
  flex-shrink: 0; position: relative;
}

/* ======================================================
   印刷エリア（余白10mm）
   - flex-columnで ヘッダー＋エディタを縦積み
   ====================================================== */
.print-area {
  margin: var(--mg);
  height: calc(var(--ph) - 2 * var(--mg));
  display: flex; flex-direction: column;
  position: relative;
}

/* ======================================================
   ページヘッダー（行番号専用エリア）
   本文と分離し、ボーダーで区切る
   ====================================================== */
.page-header {
  height: var(--hdr);
  flex-shrink: 0;
  border-bottom: 0.5px solid #d8d8d8;
  position: relative;
  overflow: hidden;
  background: transparent;
}

/* 行番号バッジ（ヘッダー内に絶対配置） */
.lnum-badge {
  position: absolute;
  font-size: 6pt;
  font-family: var(--ui-font);
  color: var(--num-c);
  line-height: 1;
  white-space: nowrap;
  writing-mode: horizontal-tb;
  bottom: 3px;            /* ヘッダー下端（ボーダー直上）に配置 */
  transform-origin: bottom right;
}

/* ======================================================
   縦書きエディタ本体
   writing-mode:vertical-rl → 列が右→左へ伸びる
   height（物理）= 列の高さ = var(--ph) - 2*mg - hdr
   width（物理）= 列が並ぶ幅 = 128mm（印刷幅）
   ====================================================== */
.editor {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font);
  font-size: 11pt;
  line-height: 2.2;
  color: var(--ink);
  flex: 1;
  min-height: 0;
  outline: none;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-break: break-all;
  overflow: hidden;
  caret-color: var(--brand);
  letter-spacing: .04em;
  -webkit-user-select: text;
  user-select: text;
}

/* プレースホルダー（1ページ目のみ） */
.editor[data-placeholder]:empty::before {
  content: attr(data-placeholder);
  color: #ccc;
  pointer-events: none;
}

/* ページラベル（画面のみ） */
.page-label {
  font-size: 10px;
  color: rgba(255,255,255,.55);
  font-family: var(--ui-font);
  align-self: flex-start;
  padding: 0 2px;
  user-select: none;
}

/* ======================================================
   ステータスバー
   ====================================================== */
#statusbar {
  background: var(--status); color: rgba(255,255,255,.88);
  font-size: 11px; height: 22px; padding: 0 12px;
  display: flex; align-items: center; gap: 16px;
  flex-shrink: 0; user-select: none; font-family: var(--ui-font);
}
#statusbar .sb-r { margin-left: auto; opacity: .7; }

/* ======================================================
   印刷 / PDF
   ====================================================== */
@media print {
  @page { size: A5 portrait; margin: 0; }
  html, body { height: auto !important; overflow: visible !important; background: #fff !important; }
  #titlebar, #ribbon, #statusbar { display: none !important; }
  .page-label { display: none !important; }
  #canvas {
    padding: 0 !important; gap: 0 !important;
    background: #fff !important;
    display: block !important; overflow: visible !important;
  }
  .paper {
    box-shadow: none !important; border: none !important;
    width: 148mm !important; height: 210mm !important;
    break-after: page; page-break-after: always;
  }
  .paper:last-child { break-after: auto; page-break-after: auto; }
  .page-header {
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .editor {
    color: #000 !important;
    caret-color: transparent !important;
    overflow: hidden !important;
    font-family: "ヒラギノ明朝 ProN","Hiragino Mincho ProN","HiraMinProN-W3",
                 "游明朝","Yu Mincho","YuMincho","ＭＳ 明朝",serif !important;
  }
}
</style>
</head>
<body>

<!-- ========== タイトルバー ========== -->
<div id="titlebar">
  <div class="logo">文</div>
  <span class="doc-name">縦書き文書1 — 縦書きエディタ</span>
  <div class="flex1"></div>
</div>

<!-- ========== リボン ========== -->
<div id="ribbon">
  <!-- フォント設定 -->
  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <span class="rl">文字</span>
      <input class="rn" type="number" id="fsInput" value="11" min="6" max="24" step="0.5">
      <span class="rl">pt</span>
      <span class="rl" style="margin-left:6px">行間</span>
      <input class="rn" type="number" id="lhInput" value="2.2" min="1.0" max="5.0" step="0.1">
    </div>
    <span class="rgrp-label">フォント</span>
  </div>
  <!-- 表示設定 -->
  <div class="rgrp" style="padding-bottom:18px">
    <label class="rchk">
      <input type="checkbox" id="showNum" checked>
      行番号を表示
    </label>
    <span class="rgrp-label">表示</span>
  </div>
  <!-- 編集 -->
  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <button class="rbtn" id="btnUndo" title="Ctrl+Z">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7v6h6"/><path d="M3 13C5.5 6.5 14 4 21 8"/>
        </svg>
        元に戻す
      </button>
      <button class="rbtn" id="btnClear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
        クリア
      </button>
    </div>
    <span class="rgrp-label">編集</span>
  </div>
  <!-- 保存 -->
  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <button class="rbtn acc" id="btnPDF">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        PDF保存
      </button>
      <button class="rbtn" id="btnDocx" style="border-color:#217346;color:#217346">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#217346" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Word保存
      </button>
    </div>
    <span class="rgrp-label">エクスポート</span>
  </div>
</div>

<!-- ========== キャンバス（ページは動的生成） ========== -->
<div id="canvas"></div>

<!-- ========== ステータスバー ========== -->
<div id="statusbar">
  <span id="sb-line">1 行目</span>
  <span id="sb-chars">0 文字</span>
  <span id="sb-lines">全 1 行</span>
  <span id="sb-pages">1 ページ</span>
  <span class="sb-r">A5縦　ヒラギノ明朝 ProN　11pt　余白 10mm</span>
</div>

<!-- docx.js 非同期ロード -->
<script>
(function(){
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/docx@8.5.0/build/index.js';
  s.onload  = () => console.log('[docx.js] loaded');
  s.onerror = () => console.warn('[docx.js] load failed');
  document.head.appendChild(s);
})();
</script>

<script>
/* ============================================================
   設定値
   ============================================================ */
let currentFs   = 11;   // pt
let currentLh   = 2.2;
let showLineNum = true;
let inputTimer  = null;
let flowTimer   = null;

/* ============================================================
   UI要素
   ============================================================ */
const canvasEl  = document.getElementById('canvas');
const fsInput   = document.getElementById('fsInput');
const lhInput   = document.getElementById('lhInput');
const showNumCb = document.getElementById('showNum');
const sbLine    = document.getElementById('sb-line');
const sbChars   = document.getElementById('sb-chars');
const sbLines   = document.getElementById('sb-lines');
const sbPages   = document.getElementById('sb-pages');

/* ============================================================
   ページ管理
   pages[] = [{ paper, printArea, header, editor }]
   ============================================================ */
const pages = [];

function createPage(index) {
  // ページラベル（画面のみ）
  const label = document.createElement('div');
  label.className = 'page-label';
  label.textContent = `— ${index + 1} ページ目 —`;

  const paper = document.createElement('div');
  paper.className = 'paper';

  const printArea = document.createElement('div');
  printArea.className = 'print-area';

  const header = document.createElement('div');
  header.className = 'page-header';

  const editor = document.createElement('div');
  editor.className = 'editor';
  editor.contentEditable = 'true';
  editor.spellcheck = false;
  editor.setAttribute('autocorrect', 'off');
  editor.setAttribute('autocapitalize', 'off');
  editor.setAttribute('data-gramm', 'false');
  if (index === 0) {
    editor.setAttribute('data-placeholder', 'ここに文章を入力してください…');
  }

  printArea.appendChild(header);
  printArea.appendChild(editor);
  paper.appendChild(printArea);
  canvasEl.appendChild(label);
  canvasEl.appendChild(paper);

  // イベント
  editor.addEventListener('input',          () => onEditorInput(index));
  editor.addEventListener('keyup',          updateStatus);
  editor.addEventListener('mouseup',        updateStatus);

  const pageObj = { label, paper, printArea, header, editor };
  pages[index] = pageObj;
  ro.observe(editor);
  return pageObj;
}

function removePage(index) {
  if (index <= 0 || index >= pages.length) return;
  const pg = pages[index];
  pg.label.remove();
  pg.paper.remove();
  ro.unobserve(pg.editor);
  pages.splice(index, 1);
  // ラベルのページ番号を更新
  pages.forEach((p, i) => { p.label.textContent = `— ${i + 1} ページ目 —`; });
}

function ensurePage(index) {
  while (pages.length <= index) createPage(pages.length);
  return pages[index];
}

/* ============================================================
   テキスト取得（末尾の余分な改行を除去）
   ============================================================ */
function getText(editorEl) {
  return editorEl.innerText.replace(/\n$/, '');
}

/* ============================================================
   オーバーフロー検出
   writing-mode:vertical-rl では列が左方向に伸びる。
   クローン（width:auto）の offsetWidth > clientWidth でページ超過を判定。
   ============================================================ */
let _measureEl = null;
function getMeasureEl() {
  if (!_measureEl) {
    _measureEl = document.createElement('div');
    _measureEl.style.cssText =
      'position:fixed;top:-9999px;left:-9999px;visibility:hidden;pointer-events:none;';
    document.body.appendChild(_measureEl);
  }
  return _measureEl;
}

function measureContentWidth(editorEl) {
  if (!editorEl.textContent && !editorEl.innerHTML) return 0;
  const clone = editorEl.cloneNode(true);
  // クローンの幅制限を解除（列数を自然に展開させる）
  clone.style.cssText += ';width:auto!important;max-width:none!important;overflow:visible!important;';
  const me = getMeasureEl();
  me.innerHTML = '';
  me.appendChild(clone);
  const w = clone.offsetWidth;
  me.innerHTML = '';
  return w;
}

function isOverflowing(editorEl) {
  return measureContentWidth(editorEl) > editorEl.clientWidth + 2;
}

function hasRoom(editorEl) {
  // 約1.5列分の余白があれば「余裕あり」と判断
  const approxColW = currentFs * 1.333 * currentLh;
  return measureContentWidth(editorEl) + approxColW * 1.5 < editorEl.clientWidth;
}

/* ============================================================
   カーソル保存・復元
   ============================================================ */
function saveCursor(editorEl) {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return null;
  const r = sel.getRangeAt(0);
  if (!editorEl.contains(r.startContainer)) return null;
  const pre = document.createRange();
  pre.selectNodeContents(editorEl);
  pre.setEnd(r.startContainer, r.startOffset);
  return pre.toString().length;
}

function restoreCursor(editorEl, offset) {
  if (offset == null) return;
  const text = editorEl.innerText;
  if (offset > text.length) { cursorToEnd(editorEl); return; }
  const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT);
  let chars = 0, node;
  while ((node = walker.nextNode())) {
    if (chars + node.length >= offset) {
      const r = document.createRange();
      r.setStart(node, offset - chars);
      r.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(r);
      return;
    }
    chars += node.length;
  }
  cursorToEnd(editorEl);
}

function cursorToEnd(editorEl) {
  const r = document.createRange();
  r.selectNodeContents(editorEl);
  r.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(r);
}

/* ============================================================
   コンテンツフロー（ページ間の文章移動）
   ============================================================ */
function pushLastParagraph(fromIndex) {
  const editor = pages[fromIndex].editor;
  const text = getText(editor);
  if (!text) return false;

  ensurePage(fromIndex + 1);
  const nextEditor = pages[fromIndex + 1].editor;
  const nextText = getText(nextEditor);
  const lines = text.split('\n');

  if (lines.length > 1) {
    const last = lines.pop();
    editor.innerText = lines.join('\n');
    nextEditor.innerText = last + (nextText ? '\n' + nextText : '');
  } else {
    // 1段落のみ → 文字単位で分割
    if (!text.length) return false;
    const last = text.slice(-1);
    editor.innerText = text.slice(0, -1);
    nextEditor.innerText = last + nextText;
  }
  return true;
}

function pullFirstParagraph(toIndex) {
  if (toIndex + 1 >= pages.length) return false;
  const editor     = pages[toIndex].editor;
  const nextEditor = pages[toIndex + 1].editor;
  const nextText   = getText(nextEditor);
  if (!nextText) return false;

  const nextLines = nextText.split('\n');
  const first     = nextLines.shift();
  const curText   = getText(editor);
  const merged    = curText + (curText ? '\n' : '') + first;

  // 試しにマージ → 溢れたら元に戻す
  editor.innerText = merged;
  if (isOverflowing(editor)) {
    editor.innerText = curText;
    return false;
  }
  nextEditor.innerText = nextLines.join('\n');
  return true;
}

function handleContentFlow(changedPageIndex) {
  const MAX_ITER = 500;
  let iter = 0;

  // 前進フェーズ：溢れたら次ページへ押し出す
  for (let i = changedPageIndex; i < pages.length && iter < MAX_ITER; i++) {
    while (isOverflowing(pages[i].editor) && iter < MAX_ITER) {
      const ok = pushLastParagraph(i);
      if (!ok) break;
      iter++;
    }
  }

  // 後退フェーズ：余裕があれば次ページから引き戻す
  for (let i = pages.length - 2; i >= 0 && iter < MAX_ITER; i--) {
    while (hasRoom(pages[i].editor) && iter < MAX_ITER) {
      const nextText = getText(pages[i + 1].editor);
      if (!nextText) { removePage(i + 1); break; }
      const ok = pullFirstParagraph(i);
      if (!ok) break;
      iter++;
    }
  }

  // 末尾の空ページを除去
  while (pages.length > 1 && !getText(pages[pages.length - 1].editor)) {
    removePage(pages.length - 1);
  }
}

/* ============================================================
   入力イベント
   ============================================================ */
function onEditorInput(pageIndex) {
  clearTimeout(inputTimer);
  clearTimeout(flowTimer);
  updateStatus();

  flowTimer = setTimeout(() => {
    // カーソル位置を保存
    const activeEditor = pages[pageIndex] ? pages[pageIndex].editor : null;
    const cursorPos    = activeEditor ? saveCursor(activeEditor) : null;
    const pageHadFocus = activeEditor && document.activeElement === activeEditor;

    handleContentFlow(pageIndex);
    updateLineNumbers();
    updateStatus();

    // カーソルを復元
    if (activeEditor && document.body.contains(activeEditor)) {
      if (pageHadFocus) {
        const restored = cursorPos != null;
        if (restored) restoreCursor(activeEditor, cursorPos);
        else cursorToEnd(activeEditor);
      }
    }
  }, 80);
}

/* ============================================================
   行番号の更新
   行番号はヘッダー枠内に配置（本文エリアと非重複）
   ============================================================ */
function updateLineNumbers() {
  pages.forEach(p => { p.header.innerHTML = ''; });
  if (!showLineNum) return;

  let lineOffset = 0;

  for (let pi = 0; pi < pages.length; pi++) {
    const { header, editor } = pages[pi];
    const text     = editor.innerText;
    const rawLines = text.split('\n');
    if (rawLines[rawLines.length - 1] === '' && rawLines.length > 1) rawLines.pop();
    const lineCount = rawLines.length;
    if (!text.trim()) { lineOffset += 1; continue; }

    // テキストノードマップ構築
    const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
    const tnodes = [];
    let node;
    while ((node = walker.nextNode())) tnodes.push(node);

    let gOff = 0;
    const offMap = [];
    for (const tn of tnodes) {
      for (let i = 0; i < tn.length; i++) { offMap[gOff] = { node: tn, offset: i }; gOff++; }
      offMap[gOff] = { node: tn, offset: tn.length }; gOff++;
    }

    // 各行の先頭グローバルオフセット
    const lineStarts = [0];
    let acc = 0;
    for (let i = 0; i < rawLines.length - 1; i++) {
      acc += rawLines[i].length + 1;
      lineStarts.push(acc);
    }

    const editorRect = editor.getBoundingClientRect();
    const headerW    = header.offsetWidth;

    for (let i = 0; i < lineCount; i++) {
      const info = offMap[lineStarts[i]];
      if (!info) continue;

      let rect = null;
      try {
        const range = document.createRange();
        range.setStart(info.node, info.offset);
        const nxt = offMap[lineStarts[i] + 1] || info;
        range.setEnd(nxt.node, nxt.offset);
        const rects = range.getClientRects();
        if (rects.length > 0) rect = rects[0];
      } catch(e) { continue; }
      if (!rect) continue;

      // ヘッダー内の right 値（ヘッダー右端からの距離）
      // = エディタ右端 - rect.right（列の右端）
      const fromRight = editorRect.right - rect.right;
      if (fromRight < -2 || fromRight > headerW + 2) continue;

      const badge = document.createElement('div');
      badge.className = 'lnum-badge';
      badge.textContent = String(i + 1 + lineOffset);
      badge.style.right  = Math.max(0, fromRight) + 'px';
      header.appendChild(badge);
    }

    lineOffset += Math.max(1, lineCount);
  }
}

/* ============================================================
   ステータスバー更新
   ============================================================ */
function updateStatus() {
  let totalText = '';
  for (const pg of pages) {
    const t = getText(pg.editor);
    if (totalText && t) totalText += '\n';
    totalText += t;
  }
  const chars  = totalText.replace(/\n/g, '').length;
  const lcount = totalText ? totalText.split('\n').length : 1;
  sbChars.textContent = chars.toLocaleString() + ' 文字';
  sbLines.textContent = '全 ' + lcount + ' 行';
  sbPages.textContent = pages.length + ' ページ';

  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    for (let pi = 0; pi < pages.length; pi++) {
      const ed = pages[pi].editor;
      if (!ed.contains(sel.getRangeAt(0).startContainer)) continue;
      const r = sel.getRangeAt(0).cloneRange();
      r.setStart(ed, 0);
      let off = 0;
      for (let j = 0; j < pi; j++) off += getText(pages[j].editor).split('\n').length;
      sbLine.textContent = (off + r.toString().split('\n').length) + ' 行目';
      break;
    }
  }
}

/* ============================================================
   フォントサイズ変更
   ============================================================ */
fsInput.addEventListener('change', () => {
  const v = Math.min(24, Math.max(6, parseFloat(fsInput.value) || 11));
  fsInput.value = v; currentFs = v;
  pages.forEach(p => { p.editor.style.fontSize = v + 'pt'; });
  setTimeout(() => { handleContentFlow(0); updateLineNumbers(); }, 150);
});

/* ============================================================
   行間変更
   ============================================================ */
lhInput.addEventListener('change', () => {
  const v = Math.min(5, Math.max(1, parseFloat(lhInput.value) || 2.2));
  lhInput.value = v.toFixed(1); currentLh = v;
  pages.forEach(p => { p.editor.style.lineHeight = String(v); });
  setTimeout(() => { handleContentFlow(0); updateLineNumbers(); }, 150);
});

/* ============================================================
   行番号表示切替
   ============================================================ */
showNumCb.addEventListener('change', () => {
  showLineNum = showNumCb.checked;
  updateLineNumbers();
});

/* ============================================================
   元に戻す
   ============================================================ */
document.getElementById('btnUndo').addEventListener('click', () => {
  const active = document.activeElement;
  if (active && active.classList.contains('editor')) active.focus();
  else if (pages.length) pages[0].editor.focus();
  document.execCommand('undo');
  setTimeout(() => { handleContentFlow(0); updateStatus(); updateLineNumbers(); }, 50);
});

/* ============================================================
   クリア
   ============================================================ */
document.getElementById('btnClear').addEventListener('click', () => {
  if (!pages.some(p => getText(p.editor))) return;
  if (!confirm('すべての内容をクリアしますか？')) return;
  while (pages.length > 1) removePage(pages.length - 1);
  pages[0].editor.focus();
  document.execCommand('selectAll');
  document.execCommand('delete');
  updateStatus(); updateLineNumbers();
});

/* ============================================================
   PDF 保存（window.print → ブラウザの「PDFに保存」）
   ============================================================ */
document.getElementById('btnPDF').addEventListener('click', () => {
  pages.forEach(p => p.editor.blur());
  setTimeout(() => window.print(), 80);
});

/* ============================================================
   Word (.docx) 保存
   ============================================================ */
document.getElementById('btnDocx').addEventListener('click', async () => {
  // 全ページのテキストを集約
  let allLines = [];
  for (const pg of pages) {
    const t = getText(pg.editor);
    const ls = t.split('\n');
    if (ls[ls.length - 1] === '') ls.pop();
    allLines = allLines.concat(ls);
  }

  if (window.docx) {
    try {
      const { Document, Packer, Paragraph, TextRun } = window.docx;
      const A5W = 8391, A5H = 11906, MG = 567;
      const paragraphs = allLines.map(line =>
        new Paragraph({
          children: [new TextRun({
            text: line || ' ',
            font: { name: 'MS Mincho' },
            size: Math.round(currentFs * 2),
          })],
          spacing: { line: Math.round(currentLh * 240), lineRule: 'auto' },
        })
      );
      const doc = new Document({
        sections: [{ properties: {
          page: {
            size:   { width: A5W, height: A5H },
            margin: { top: MG, right: MG, bottom: MG, left: MG },
            textDirection: 'tbRl',
          }}, children: paragraphs
        }]
      });
      const buf = await Packer.toBlob(doc);
      const url = URL.createObjectURL(buf);
      const a = document.createElement('a');
      a.href = url; a.download = '縦書き文書.docx'; a.click();
      URL.revokeObjectURL(url);
      return;
    } catch(e) { console.warn('docx.js error, fallback:', e); }
  }
  saveDocxFallback(allLines);
});

/* ============================================================
   DOCX フォールバック
   ============================================================ */
async function saveDocxFallback(lines) {
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  const halfPt  = Math.round(currentFs * 2);
  const lineVal = Math.round(currentLh * 240);
  const paragraphsXml = lines.map(line => {
    const txt = esc(line || ' ');
    return `<w:p>
  <w:pPr>
    <w:spacing w:line="${lineVal}" w:lineRule="auto"/>
    <w:textDirection w:val="tbRl"/>
    <w:jc w:val="start"/>
  </w:pPr>
  <w:r>
    <w:rPr>
      <w:rFonts w:ascii="MS Mincho" w:hAnsi="MS Mincho" w:cs="MS Mincho" w:eastAsia="MS Mincho"/>
      <w:sz w:val="${halfPt}"/>
      <w:szCs w:val="${halfPt}"/>
    </w:rPr>
    <w:t xml:space="preserve">${txt}</w:t>
  </w:r>
</w:p>`;
  }).join('\n');

  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w10="urn:schemas-microsoft-com:office:word"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup"
  xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk"
  xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml"
  xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape"
  mc:Ignorable="w14 wp14">
  <w:body>${paragraphsXml}
    <w:sectPr>
      <w:pgSz w:w="8391" w:h="11906"/>
      <w:pgMar w:top="567" w:right="567" w:bottom="567" w:left="567"
               w:header="567" w:footer="567" w:gutter="0"/>
      <w:textDirection w:val="tbRl"/>
    </w:sectPr>
  </w:body>
</w:document>`;

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"
    Target="word/document.xml"/>
</Relationships>`;
  const wordRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings"
    Target="settings.xml"/>
</Relationships>`;
  const settingsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:defaultTabStop w:val="840"/>
</w:settings>`;
  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml"  ContentType="application/xml"/>
  <Override PartName="/word/document.xml"
    ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/settings.xml"
    ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
</Types>`;

  try {
    const zip = new MiniZip();
    zip.add('[Content_Types].xml', contentTypesXml);
    zip.add('_rels/.rels',         relsXml);
    zip.add('word/document.xml',   documentXml);
    zip.add('word/_rels/document.xml.rels', wordRelsXml);
    zip.add('word/settings.xml',   settingsXml);
    const blob = zip.toBlob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = '縦書き文書.docx'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Word保存に失敗しました。\n' + e.message);
    console.error(e);
  }
}

/* ============================================================
   MiniZip
   ============================================================ */
class MiniZip {
  constructor() { this.files = []; }
  add(name, content) {
    this.files.push({ name, data: new TextEncoder().encode(content) });
  }
  toBlob() {
    const parts = [], central = [];
    let offset = 0;
    for (const f of this.files) {
      const nb  = new TextEncoder().encode(f.name);
      const crc = crc32(f.data), sz = f.data.length;
      const lh  = new DataView(new ArrayBuffer(30));
      lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0,true);
      lh.setUint16(8,0,true);lh.setUint16(10,0,true);lh.setUint16(12,0,true);
      lh.setUint32(14,crc,true);lh.setUint32(18,sz,true);lh.setUint32(22,sz,true);
      lh.setUint16(26,nb.length,true);lh.setUint16(28,0,true);
      parts.push(new Uint8Array(lh.buffer), nb, f.data);
      const cd = new DataView(new ArrayBuffer(46));
      cd.setUint32(0,0x02014b50,true);cd.setUint16(4,20,true);cd.setUint16(6,20,true);
      cd.setUint16(8,0,true);cd.setUint16(10,0,true);cd.setUint16(12,0,true);
      cd.setUint16(14,0,true);cd.setUint32(16,crc,true);cd.setUint32(20,sz,true);
      cd.setUint32(24,sz,true);cd.setUint16(28,nb.length,true);cd.setUint16(30,0,true);
      cd.setUint16(32,0,true);cd.setUint16(34,0,true);cd.setUint16(36,0,true);
      cd.setUint32(38,0,true);cd.setUint32(42,offset,true);
      central.push(new Uint8Array(cd.buffer), nb);
      offset += 30 + nb.length + sz;
    }
    const cdSz  = central.reduce((a,b) => a+b.length, 0);
    const eocdr = new DataView(new ArrayBuffer(22));
    eocdr.setUint32(0,0x06054b50,true);eocdr.setUint16(4,0,true);eocdr.setUint16(6,0,true);
    eocdr.setUint16(8,this.files.length,true);eocdr.setUint16(10,this.files.length,true);
    eocdr.setUint32(12,cdSz,true);eocdr.setUint32(16,offset,true);eocdr.setUint16(20,0,true);
    const all = [...parts,...central,new Uint8Array(eocdr.buffer)];
    const out = new Uint8Array(all.reduce((a,b)=>a+b.length,0));
    let pos = 0; for (const c of all) { out.set(c,pos); pos+=c.length; }
    return new Blob([out], {type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  }
}
function crc32(buf) {
  let c = 0xFFFFFFFF;
  const tbl = crc32.t || (crc32.t = (() => {
    const t = new Uint32Array(256);
    for (let i=0;i<256;i++){let v=i;for(let j=0;j<8;j++)v=(v&1)?0xEDB88320^(v>>>1):v>>>1;t[i]=v;}
    return t;
  })());
  for (let i=0;i<buf.length;i++) c=tbl[(c^buf[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
