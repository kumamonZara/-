<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縦書きエディタ</title>

<!-- docx.js (Word形式生成) -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
/* ======================================================
   リセット・変数
   ====================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font:      "ヒラギノ明朝 ProN","Hiragino Mincho ProN","HiraMinProN-W3",
               "游明朝","Yu Mincho","YuMincho","ＭＳ 明朝",serif;
  --ui-font:   system-ui, "Helvetica Neue", sans-serif;
  --fs:        11;          /* pt (数値のみ, JSで使用) */
  --lh:        2.2;

  /* A5: 148×210mm, 余白10mm → 印刷幅128mm, 高190mm */
  --pw:  148mm;
  --ph:  210mm;
  --mg:  10mm;

  /* ブランドカラー */
  --brand:    #1a4e8a;
  --brand-dk: #123567;
  --brand-lt: #d6e8f7;
  --ribbon:   #f3f3f3;
  --rb-line:  #d0d0d0;
  --canvas:   #8c8c8c;
  --paper:    #ffffff;
  --ink:      #0d0d0d;
  --num-c:    #aaaaaa;
  --status:   #1a4e8a;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--ui-font);
  background: var(--canvas);
}

body { display: flex; flex-direction: column; }

/* ======================================================
   タイトルバー
   ====================================================== */
#titlebar {
  background: var(--brand);
  color: #fff;
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  flex-shrink: 0;
  user-select: none;
}
#titlebar .logo {
  font-family: Georgia, serif;
  font-size: 14px; font-weight: bold;
  background: #fff; color: var(--brand);
  width: 20px; height: 20px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#titlebar .doc-name { font-size: 12px; opacity: .85; }
#titlebar .flex1 { flex: 1; }
.wbtn {
  width: 24px; height: 24px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; color: rgba(255,255,255,.8);
  transition: background .12s;
}
.wbtn:hover { background: rgba(255,255,255,.2); }
.wbtn.cl:hover { background: #c42b1c; color: #fff; }

/* ======================================================
   リボン（ツールバー）
   ====================================================== */
#ribbon {
  background: var(--ribbon);
  border-bottom: 1px solid var(--rb-line);
  display: flex;
  align-items: stretch;
  padding: 0 6px;
  flex-shrink: 0;
  min-height: 62px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.rgrp {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px 10px;
  gap: 4px;
  border-right: 1px solid var(--rb-line);
  position: relative;
}
.rgrp:last-child { border-right: none; }

.rgrp-label {
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  color: #999;
  letter-spacing: .04em;
}

.rrow { display: flex; align-items: center; gap: 5px; }

/* ラベル */
.rl { font-size: 11px; color: #555; font-family: var(--ui-font); }

/* 数値入力 */
.rn {
  width: 46px; padding: 3px 4px;
  border: 1px solid #bbb; border-radius: 3px;
  font-size: 12px; text-align: center;
  background: #fff; color: #222;
  font-family: var(--ui-font);
}
.rn:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-lt); }

/* ボタン */
.rbtn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 3px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--ui-font);
  color: #222;
  display: flex; align-items: center; gap: 4px;
  transition: background .1s, border-color .1s;
  white-space: nowrap;
}
.rbtn:hover  { background: #e3e3e3; border-color: #bbb; }
.rbtn:active { background: #d3d3d3; }
.rbtn.acc {
  background: var(--brand); color: #fff;
  border-color: var(--brand-dk);
  font-weight: 600; padding: 5px 14px;
}
.rbtn.acc:hover  { background: var(--brand-dk); }
.rbtn.acc:active { background: #0d2749; }

/* チェックボックス */
.rchk {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #333;
  cursor: pointer; font-family: var(--ui-font);
}
.rchk input { accent-color: var(--brand); cursor: pointer; }

/* セレクト */
.rsel {
  border: 1px solid #bbb; border-radius: 3px;
  padding: 3px 4px; font-size: 12px;
  background: #fff; color: #222;
  font-family: var(--ui-font);
  cursor: pointer;
}
.rsel:focus { outline: none; border-color: var(--brand); }

/* ======================================================
   スクロールキャンバス
   ====================================================== */
#canvas {
  flex: 1;
  overflow: auto;
  padding: 24px 0 28px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* ======================================================
   用紙（A5）
   ====================================================== */
#paper {
  background: var(--paper);
  width:  var(--pw);
  min-height: var(--ph);
  box-shadow: 0 2px 20px rgba(0,0,0,.4), 0 0 0 1px rgba(0,0,0,.15);
  flex-shrink: 0;
  position: relative;
}

/* ======================================================
   印刷エリア（余白10mm）
   ====================================================== */
#print-area {
  margin: var(--mg);
  position: relative;
  /* 縦書きコンテナの高さ = 210mm - 20mm = 190mm */
  min-height: calc(var(--ph) - 2 * var(--mg));
}

/* ======================================================
   縦書きエディタ本体
   
   ポイント：
   - writing-mode: vertical-rl → 文字が上→下、列が右→左
   - white-space: pre-wrap → Enter で改行（= 縦書きでは左への列移動）
   - overflow-wrap: break-word → A5高さを超えたら折り返し（次列へ）
   - min-height: 190mm → 用紙の印刷エリア高に合わせる
   ====================================================== */
#editor {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font);
  font-size: 11pt;
  line-height: 2.2;
  color: var(--ink);

  /* 190mmの高さで折り返し → 超えたら左の列へ */
  width: 100%;
  min-height: calc(var(--ph) - 2 * var(--mg));
  max-height: calc(var(--ph) - 2 * var(--mg));

  outline: none;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-break: break-all;
  overflow: hidden;   /* 用紙からはみ出し防止 */

  caret-color: var(--brand);
  letter-spacing: .04em;

  /* 選択色 */
  -webkit-user-select: text;
  user-select: text;
}

/* プレースホルダー */
#editor:empty::before {
  content: "ここに文章を入力してください…";
  color: #ccc;
  pointer-events: none;
}

/* ======================================================
   行番号オーバーレイ
   行番号は JS で計算し、absolute で各列の先頭に配置
   ====================================================== */
#line-num-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}

.lnum-badge {
  position: absolute;
  font-size: 6.5pt;
  font-family: var(--ui-font);
  color: var(--num-c);
  line-height: 1;
  white-space: nowrap;
  /* writing-mode は親に合わせない（横書きで数字表示） */
  writing-mode: horizontal-tb;
  transform-origin: top right;
}

/* ======================================================
   ステータスバー
   ====================================================== */
#statusbar {
  background: var(--status);
  color: rgba(255,255,255,.88);
  font-size: 11px;
  height: 22px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  user-select: none;
  font-family: var(--ui-font);
}
#statusbar .sb-r { margin-left: auto; opacity: .7; }

/* ======================================================
   印刷 / PDF
   ====================================================== */
@media print {
  @page { size: A5 portrait; margin: 0; }

  html, body {
    height: auto !important;
    overflow: visible !important;
    background: #fff !important;
  }
  #titlebar, #ribbon, #statusbar { display: none !important; }
  #canvas {
    padding: 0 !important;
    background: #fff !important;
    display: block !important;
    overflow: visible !important;
  }
  #paper {
    box-shadow: none !important;
    border: none !important;
    width: 148mm !important;
    min-height: 210mm !important;
    page-break-after: always;
  }
  #editor {
    font-family: "ヒラギノ明朝 ProN","Hiragino Mincho ProN","HiraMinProN-W3",
                 "游明朝","Yu Mincho","YuMincho","ＭＳ 明朝",serif !important;
    font-size: 11pt !important;
    color: #000 !important;
    caret-color: transparent !important;
    max-height: none !important;
    overflow: visible !important;
  }
  #line-num-overlay {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
</style>

</head>
<body>

<!-- ========== タイトルバー ========== -->

<div id="titlebar">
  <div class="logo">文</div>
  <span class="doc-name" id="docName">縦書き文書1 — 縦書きエディタ</span>
  <div class="flex1"></div>
  <div class="wbtn">＿</div>
  <div class="wbtn">▢</div>
  <div class="wbtn cl">✕</div>
</div>

<!-- ========== リボン ========== -->

<div id="ribbon">

  <!-- フォント設定 -->

  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <span class="rl">文字</span>
      <input class="rn" type="number" id="fsInput" value="11" min="6" max="24" step="0.5">
      <span class="rl">pt</span>
      <span class="rl" style="margin-left:6px">行間</span>
      <input class="rn" type="number" id="lhInput" value="2.2" min="1.0" max="5.0" step="0.1">
    </div>
    <span class="rgrp-label">フォント</span>
  </div>

  <!-- 表示設定 -->

  <div class="rgrp" style="padding-bottom:18px">
    <label class="rchk">
      <input type="checkbox" id="showNum" checked>
      行番号を表示
    </label>
    <span class="rgrp-label">表示</span>
  </div>

  <!-- 編集 -->

  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <button class="rbtn" id="btnUndo" title="Ctrl+Z">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13C5.5 6.5 14 4 21 8"/></svg>
        元に戻す
      </button>
      <button class="rbtn" id="btnClear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        クリア
      </button>
    </div>
    <span class="rgrp-label">編集</span>
  </div>

  <!-- 保存 -->

  <div class="rgrp" style="padding-bottom:18px">
    <div class="rrow">
      <button class="rbtn acc" id="btnPDF">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF保存
      </button>
      <button class="rbtn" id="btnDocx" style="border-color:#217346;color:#217346">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#217346" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Word保存
      </button>
    </div>
    <span class="rgrp-label">エクスポート</span>
  </div>

</div>

<!-- ========== キャンバス ========== -->

<div id="canvas">
  <div id="paper">
    <div id="print-area">
      <!-- 行番号オーバーレイ -->
      <div id="line-num-overlay"></div>
      <!-- 本文エディタ（1つのcontenteditable） -->
      <div id="editor"
           contenteditable="true"
           spellcheck="false"
           autocorrect="off"
           autocapitalize="off"
           data-gramm="false"
      ></div>
    </div>
  </div>
</div>

<!-- ========== ステータスバー ========== -->

<div id="statusbar">
  <span id="sb-line">1 行目</span>
  <span id="sb-chars">0 文字</span>
  <span id="sb-lines">全 1 行</span>
  <span class="sb-r">A5縦　ヒラギノ明朝 ProN　11pt　余白 10mm</span>
</div>

<!-- docx生成ライブラリ（非同期ロード） -->

<script>
// docx.jsをCDNから動的ロード
(function(){
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/docx@8.5.0/build/index.js';
  s.onload  = () => console.log('[docx.js] loaded');
  s.onerror = () => console.warn('[docx.js] load failed');
  document.head.appendChild(s);
})();
</script>

<script>
/* ============================================================
   要素取得
   ============================================================ */
const editorEl   = document.getElementById('editor');
const overlayEl  = document.getElementById('line-num-overlay');
const fsInput    = document.getElementById('fsInput');
const lhInput    = document.getElementById('lhInput');
const showNumCb  = document.getElementById('showNum');
const sbLine     = document.getElementById('sb-line');
const sbChars    = document.getElementById('sb-chars');
const sbLines    = document.getElementById('sb-lines');

/* ============================================================
   設定値
   ============================================================ */
let currentFs = 11;    // pt
let currentLh = 2.2;
let showLineNum = true;

/* ============================================================
   Undo / Redo（ブラウザ標準 execCommand ベース）
   
   Word方式：ブラウザの document.execCommand('undo') を
   そのまま使う。contenteditable では自動的にundo履歴が
   管理されるため、追加実装不要。
   ============================================================ */

/* ============================================================
   行番号の配置
   
   縦書きの「行」= 画面上の列（右→左）。
   各列の一番上（= 文字の先頭）に行番号を絶対配置する。
   
   アルゴリズム：
   1. editorEl の getBoundingClientRect() を基準に
   2. 文字ごとに getClientRects() で位置を調べる手法は
      縦書きでは不安定なので、
   3. 代わりに「段落（改行）ごと」の先頭文字の位置を使う。
   
   実際の実装：
   - Range を使って各 \n の直後の文字位置を取得
   - その right 座標（縦書きでは列の位置）と top 座標を使用
   ============================================================ */
function updateLineNumbers() {
  overlayEl.innerHTML = '';
  if (!showLineNum) return;

  const editorRect = editorEl.getBoundingClientRect();
  const printRect  = document.getElementById('print-area').getBoundingClientRect();

  // テキストを改行で分割して行数を把握
  const text = editorEl.innerText;
  const rawLines = text.split('\n');
  // 最後が空なら除く（innerText末尾の改行対策）
  if (rawLines[rawLines.length - 1] === '' && rawLines.length > 1) {
    rawLines.pop();
  }
  const lineCount = rawLines.length;

  // 各行の先頭文字の位置を Range で取得
  // textNode を走査してオフセットを計算
  const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) textNodes.push(node);

  // 全テキストの文字オフセット→{node, offset} マップ
  let globalOffset = 0;
  const offsetMap = []; // [globalOffset] => {node, localOffset}
  for (const tn of textNodes) {
    for (let i = 0; i < tn.length; i++) {
      offsetMap[globalOffset] = { node: tn, offset: i };
      globalOffset++;
    }
    // 改行(テキストノード間)
    offsetMap[globalOffset] = { node: tn, offset: tn.length };
    globalOffset++;
  }

  // 各行の先頭グローバルオフセットを計算
  const lineStartOffsets = [0];
  let acc = 0;
  for (let i = 0; i < rawLines.length - 1; i++) {
    // rawLines[i].length + 1 (\n 分)
    acc += rawLines[i].length + 1;
    lineStartOffsets.push(acc);
  }

  // 各行先頭文字の Rect を取得して行番号バッジを配置
  for (let i = 0; i < lineCount; i++) {
    const startOffset = lineStartOffsets[i];
    const info = offsetMap[startOffset];
    if (!info) continue;

    let rect = null;
    try {
      const range = document.createRange();
      range.setStart(info.node, info.offset);
      // 次の文字までの範囲
      const nextInfo = offsetMap[startOffset + 1] || info;
      range.setEnd(nextInfo.node, nextInfo.offset);
      const rects = range.getClientRects();
      if (rects.length > 0) rect = rects[0];
    } catch(e) { continue; }

    if (!rect) continue;

    // 印刷エリア相対座標に変換
    const top   = rect.top  - printRect.top;
    const right = rect.right - printRect.left;
    // 縦書きでは「列の右端 = その行の先頭側」= 行番号をその右上に
    const badge = document.createElement('div');
    badge.className = 'lnum-badge';
    badge.textContent = String(i + 1);
    // 列の右側（= 縦書きの先頭側）に配置
    // right座標を使い、top は列の上端（テキスト先頭）に合わせる
    badge.style.cssText = `
      right: ${printRect.right - printRect.left - right + 1}px;
      top: ${Math.max(0, top)}px;
    `;
    overlayEl.appendChild(badge);
  }
}

/* ============================================================
   ステータスバー更新
   ============================================================ */
function updateStatus() {
  const text   = editorEl.innerText;
  const chars  = text.replace(/\n$/, '').length;
  const lines  = text.split('\n');
  const lcount = lines[lines.length - 1] === '' ? lines.length - 1 : lines.length;

  sbChars.textContent = chars.toLocaleString() + ' 文字';
  sbLines.textContent = '全 ' + Math.max(1, lcount) + ' 行';

  // カーソル行
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0).cloneRange();
    range.collapse(true);
    range.setStart(editorEl, 0);
    const beforeText = range.toString();
    const lineIdx = beforeText.split('\n').length;
    sbLine.textContent = lineIdx + ' 行目';
  }
}

/* ============================================================
   入力イベント（Word同様、ネイティブ contenteditable に委譲）
   ============================================================ */
let updateTimer = null;
editorEl.addEventListener('input', () => {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(() => {
    updateStatus();
    updateLineNumbers();
  }, 50);
});

editorEl.addEventListener('keyup', updateStatus);
editorEl.addEventListener('mouseup', updateStatus);
editorEl.addEventListener('selectionchange', updateStatus);

// Enter キー：ブラウザデフォルト（=改行＝縦書きでは左への列移動）
// → 何もしない。contenteditable の自然な挙動に任せる。

/* ============================================================
   フォントサイズ変更
   ============================================================ */
fsInput.addEventListener('change', () => {
  const v = Math.min(24, Math.max(6, parseFloat(fsInput.value) || 11));
  fsInput.value = v;
  currentFs = v;
  editorEl.style.fontSize = v + 'pt';
  setTimeout(updateLineNumbers, 100);
});

/* ============================================================
   行間変更
   ============================================================ */
lhInput.addEventListener('change', () => {
  const v = Math.min(5, Math.max(1, parseFloat(lhInput.value) || 2.2));
  lhInput.value = v.toFixed(1);
  currentLh = v;
  editorEl.style.lineHeight = String(v);
  setTimeout(updateLineNumbers, 100);
});

/* ============================================================
   行番号表示切替
   ============================================================ */
showNumCb.addEventListener('change', () => {
  showLineNum = showNumCb.checked;
  updateLineNumbers();
});

/* ============================================================
   元に戻す（ブラウザ標準 undo）
   ============================================================ */
document.getElementById('btnUndo').addEventListener('click', () => {
  editorEl.focus();
  document.execCommand('undo');
  setTimeout(() => { updateStatus(); updateLineNumbers(); }, 30);
});

/* ============================================================
   クリア
   ============================================================ */
document.getElementById('btnClear').addEventListener('click', () => {
  if (!editorEl.innerText.trim()) return;
  if (!confirm('すべての内容をクリアしますか？')) return;
  editorEl.focus();
  document.execCommand('selectAll');
  document.execCommand('delete');
  updateStatus();
  updateLineNumbers();
});

/* ============================================================
   PDF 保存
   ============================================================ */
document.getElementById('btnPDF').addEventListener('click', () => {
  // 行番号オーバーレイを印刷に含める準備
  overlayEl.style.pointerEvents = 'none';
  // エディタを印刷モードに
  editorEl.blur();
  setTimeout(() => {
    window.print();
  }, 80);
});

/* ============================================================
   Word (.docx) 保存
   
   docx.js が CDN から読み込まれていない場合は
   フォールバックとして XML を手組みして Blob 生成する。
   ============================================================ */
document.getElementById('btnDocx').addEventListener('click', async () => {
  const text = editorEl.innerText;
  // 末尾の空行を除いた各行
  const rawLines = text.split('\n');
  if (rawLines[rawLines.length - 1] === '') rawLines.pop();

  // --- docx.js が使える場合 ---
  if (window.docx) {
    try {
      const { Document, Packer, Paragraph, TextRun, AlignmentType } = window.docx;

      // A5: 8418 × 11906 DXA (1440 DXA = 1 inch = 25.4mm)
      // 148mm = 148/25.4 * 1440 ≈ 8391 DXA
      // 210mm = 210/25.4 * 1440 ≈ 11906 DXA
      // 余白10mm = 10/25.4 * 1440 ≈ 567 DXA
      const A5W  = 8391;
      const A5H  = 11906;
      const MG   = 567;

      const paragraphs = rawLines.map(line =>
        new Paragraph({
          children: [
            new TextRun({
              text: line || ' ',
              font: { name: "MS Mincho" }, // Wordで開く際の汎用フォント
              size: Math.round(currentFs * 2), // half-points
            })
          ],
          spacing: { line: Math.round(currentLh * 240), lineRule: 'auto' },
          // 縦書き設定はWord XMLで対応（docx.jsの限界のため段落prop追加）
        })
      );

      const doc = new Document({
        sections: [{
          properties: {
            page: {
              size:   { width: A5W, height: A5H },
              margin: { top: MG, right: MG, bottom: MG, left: MG },
              // 縦書き
              textDirection: 'tbRl',
            },
          },
          children: paragraphs,
        }],
      });

      const buf = await Packer.toBlob(doc);
      const url = URL.createObjectURL(buf);
      const a   = document.createElement('a');
      a.href = url; a.download = '縦書き文書.docx';
      a.click();
      URL.revokeObjectURL(url);
      return;
    } catch(e) {
      console.warn('docx.js error, fallback:', e);
    }
  }

  // --- フォールバック：手組みOOXML ---
  saveDocxFallback(rawLines);
});

/* ============================================================
   DOCX フォールバック（docx.js 不要・純粋 ZIP/XML 手組み）
   
   JSZip も使わず、最小限の OOXML を Base64 で埋め込む方式。
   ============================================================ */
async function saveDocxFallback(lines) {
  // 行テキストを XML エスケープ
  function esc(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 段落XML生成（縦書き、ヒラギノ明朝 ProN フォント）
  // フォントはMS Mincho（Word標準）で代替
  const halfPt = Math.round(currentFs * 2);
  const lineVal = Math.round(currentLh * 240);

  const paragraphsXml = lines.map(line => {
    const txt = esc(line || ' ');
    return `<w:p>
  <w:pPr>
    <w:spacing w:line="${lineVal}" w:lineRule="auto"/>
    <w:textDirection w:val="tbRl"/>
    <w:jc w:val="start"/>
  </w:pPr>
  <w:r>
    <w:rPr>
      <w:rFonts w:ascii="MS Mincho" w:hAnsi="MS Mincho" w:cs="MS Mincho" w:eastAsia="MS Mincho"/>
      <w:sz w:val="${halfPt}"/>
      <w:szCs w:val="${halfPt}"/>
    </w:rPr>
    <w:t xml:space="preserve">${txt}</w:t>
  </w:r>
</w:p>`;
  }).join('\n');

  // A5 DXA値
  // 148mm → 8391 DXA, 210mm → 11906 DXA, 10mm → 567 DXA
  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w10="urn:schemas-microsoft-com:office:word"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup"
  xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk"
  xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml"
  xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape"
  mc:Ignorable="w14 wp14">
  <w:body>
${paragraphsXml}
    <w:sectPr>
      <w:pgSz w:w="8391" w:h="11906"/>
      <w:pgMar w:top="567" w:right="567" w:bottom="567" w:left="567"
               w:header="567" w:footer="567" w:gutter="0"/>
      <w:textDirection w:val="tbRl"/>
    </w:sectPr>
  </w:body>
</w:document>`;

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"
    Target="word/document.xml"/>
</Relationships>`;

  const wordRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings"
    Target="settings.xml"/>
</Relationships>`;

  const settingsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:defaultTabStop w:val="840"/>
</w:settings>`;

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml"  ContentType="application/xml"/>
  <Override PartName="/word/document.xml"
    ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/settings.xml"
    ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
</Types>`;

  // ZIP を手動生成（JSZip 不使用）
  // ブラウザ内で ZIP バイナリを作る軽量実装
  try {
    const zip = new MiniZip();
    zip.add('[Content_Types].xml', contentTypesXml);
    zip.add('_rels/.rels',         relsXml);
    zip.add('word/document.xml',   documentXml);
    zip.add('word/_rels/document.xml.rels', wordRelsXml);
    zip.add('word/settings.xml',   settingsXml);
    const blob = zip.toBlob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = '縦書き文書.docx';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Word保存に失敗しました。\nブラウザのコンソールを確認してください。\n' + e.message);
    console.error(e);
  }
}

/* ============================================================
   MiniZip：JSZip 不要の最小 ZIP 実装（Stored 方式のみ）
   ============================================================ */
class MiniZip {
  constructor() { this.files = []; }

  add(name, content) {
    const enc  = new TextEncoder();
    const data = enc.encode(content);
    this.files.push({ name, data });
  }

  toBlob() {
    const parts   = [];
    const central = [];
    let offset    = 0;

    for (const f of this.files) {
      const nameBuf = new TextEncoder().encode(f.name);
      const crc     = crc32(f.data);
      const size    = f.data.length;

      // Local file header
      const lhSize = 30 + nameBuf.length;
      const lh = new DataView(new ArrayBuffer(30));
      lh.setUint32(0,  0x04034b50, true); // signature
      lh.setUint16(4,  20, true);          // version needed
      lh.setUint16(6,  0,  true);          // flags
      lh.setUint16(8,  0,  true);          // compression (stored)
      lh.setUint16(10, 0,  true);          // mod time
      lh.setUint16(12, 0,  true);          // mod date
      lh.setUint32(14, crc,  true);        // crc32
      lh.setUint32(18, size, true);        // compressed size
      lh.setUint32(22, size, true);        // uncompressed size
      lh.setUint16(26, nameBuf.length, true);
      lh.setUint16(28, 0, true);           // extra length

      parts.push(new Uint8Array(lh.buffer), nameBuf, f.data);

      // Central directory entry
      const cd = new DataView(new ArrayBuffer(46));
      cd.setUint32(0,  0x02014b50, true);  // signature
      cd.setUint16(4,  20, true);           // version made by
      cd.setUint16(6,  20, true);           // version needed
      cd.setUint16(8,  0,  true);           // flags
      cd.setUint16(10, 0,  true);           // compression
      cd.setUint16(12, 0,  true);           // mod time
      cd.setUint16(14, 0,  true);           // mod date
      cd.setUint32(16, crc,  true);
      cd.setUint32(20, size, true);
      cd.setUint32(24, size, true);
      cd.setUint16(28, nameBuf.length, true);
      cd.setUint16(30, 0, true);            // extra
      cd.setUint16(32, 0, true);            // comment
      cd.setUint16(34, 0, true);            // disk start
      cd.setUint16(36, 0, true);            // internal attr
      cd.setUint32(38, 0, true);            // external attr
      cd.setUint32(42, offset, true);       // relative offset

      central.push(new Uint8Array(cd.buffer), nameBuf);
      offset += lhSize + size;
    }

    // End of central directory
    const cdSize   = central.reduce((a, b) => a + b.length, 0);
    const eocdr = new DataView(new ArrayBuffer(22));
    eocdr.setUint32(0,  0x06054b50, true); // signature
    eocdr.setUint16(4,  0, true);           // disk num
    eocdr.setUint16(6,  0, true);           // disk with cd
    eocdr.setUint16(8,  this.files.length, true);
    eocdr.setUint16(10, this.files.length, true);
    eocdr.setUint32(12, cdSize, true);
    eocdr.setUint32(16, offset, true);      // cd offset
    eocdr.setUint16(20, 0, true);           // comment length

    const all = [...parts, ...central, new Uint8Array(eocdr.buffer)];
    const totalLen = all.reduce((a, b) => a + b.length, 0);
    const out = new Uint8Array(totalLen);
    let pos = 0;
    for (const chunk of all) { out.set(chunk, pos); pos += chunk.length; }

    return new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  }
}

/* CRC32 実装 */
function crc32(buf) {
  let c = 0xFFFFFFFF;
  const table = crc32.table || (crc32.table = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let v = i;
      for (let j = 0; j < 8; j++) v = (v & 1) ? 0xEDB88320 ^ (v >>> 1) : v >>> 1;
      t[i] = v;
    }
    return t;
  })());
  for (let i = 0; i < buf.length; i++) c = table[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

   ResizeObserver：用紙リサイズ時に行番号を再計算

const ro = new ResizeObserver(() => {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(updateLineNumbers, 80);
});
ro.observe(editorEl);

  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    // ブラウザ標準undo（何もしない）
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('btnPDF').click();
  }
});
